<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You Name It: Code Typing Game Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header>
        <h1>🎮 You Name It: Code Typing Game</h1>
        <p>Type the falling code snippets before they hit the bottom!</p>
      </header>

      <section class="hud" aria-label="Game stats">
        <p>Score: <span id="score">0</span></p>
        <p>Lives: <span id="lives">3</span></p>
        <p>Combo: <span id="combo">0</span></p>
      </section>

      <section id="playfield" class="playfield" aria-label="Typing area"></section>

      <form id="input-form" class="input-row" autocomplete="off">
        <label for="typing-input" class="sr-only">Type snippet</label>
        <input
          id="typing-input"
          type="text"
          placeholder="Type snippet here..."
          autocapitalize="off"
          spellcheck="false"
        />
        <button id="start-btn" type="button">Start Game</button>
      </form>

      <p id="status" class="status" aria-live="polite">Tap Start Game to begin.</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
